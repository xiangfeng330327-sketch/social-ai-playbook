<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 内容攻略提炼器</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="noise-overlay"></div>
    <main class="app-shell">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="brand-name">ContentForge</span>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section-label">工作区</div>
          <a class="nav-item active" href="#" data-view="workspace">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>内容提炼</span>
          </a>
          <a class="nav-item" href="#" data-view="history">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 20V10M18 20V4M6 20v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>历史记录</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <button class="settings-trigger js-settings-button" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2"/></svg>
            <span>设置</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <h1>内容提炼工作台</h1>
            <p class="topbar-desc">从短内容中提炼方法论、行动攻略与写作资产</p>
          </div>
          <div class="topbar-right">
            <div class="mode-switcher" role="group" aria-label="输出模式">
              <button class="mode-btn active" type="button" data-mode="playbook">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                攻略
              </button>
              <button class="mode-btn" type="button" data-mode="research">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                复盘
              </button>
              <button class="mode-btn" type="button" data-mode="content">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 19l7-7 3 3-7 7-3-3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                发布
              </button>
            </div>
            <button class="topbar-settings js-settings-button" type="button" aria-label="设置" title="设置">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button class="topbar-settings js-history-button" type="button" aria-label="历史记录" title="历史记录">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 20V10M18 20V4M6 20v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </header>

        <!-- Panes -->
        <div class="panes" id="workspaceView">
          <!-- Input Panel -->
          <section class="panel input-panel" aria-label="输入区">
            <div class="panel-header">
              <div class="panel-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <h2>素材输入</h2>
              </div>
              <span class="badge">任意可播放链接</span>
            </div>

            <details class="collector-card">
              <summary>
                <div class="collector-summary-left">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  <span>浏览器采集助手</span>
                </div>
                <svg class="chevron-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </summary>
              <div class="collector-body">
                <div class="collector-actions">
                  <a id="collectorLink" class="collector-link-btn" href="#">采集当前页</a>
                  <button id="copyCollectorButton" class="btn btn-ghost btn-sm" type="button">复制脚本</button>
                  <button id="importCollectedButton" class="btn btn-ghost btn-sm" type="button">导入采集</button>
                </div>
                <p class="collector-tip">小红书/抖音：把「采集当前页」拖到书签栏 → 打开页面并滚动到评论区 → 点击书签 → 回来点导入</p>
              </div>
            </details>

            <div class="field-group">
              <label for="link">链接</label>
              <div class="input-with-action">
                <input id="link" type="url" placeholder="可放任何可播放链接；B站及变色龙可直接填链接">
                <button id="fetchButton" class="btn btn-dark" type="button">抽取</button>
              </div>
              <p class="field-hint">小红书/抖音使用浏览器采集助手；B站及变色龙直接填链接后点抽取或生成。</p>
            </div>

            <div class="field-group">
              <label for="sourceText">正文 / 视频文案 / 字幕</label>
              <textarea id="sourceText" class="textarea-main" placeholder="可补充正文、视频字幕、画面里的关键信息或整理出的主要内容。&#10;小红书/抖音建议用浏览器采集助手；B站及变色龙可优先直接填链接。"></textarea>
            </div>

            <div class="field-group">
              <label for="commentsText">评论区 / 高赞评论</label>
              <textarea id="commentsText" class="textarea-comments" placeholder="粘贴高赞评论、争议评论、用户提问、作者回复。&#10;会单独提炼用户需求、痛点和可转化洞察。"></textarea>
            </div>

            <div class="field-group">
              <label for="note">你的补充</label>
              <textarea id="note" class="textarea-note" placeholder="例如：我关心 AI 产品、AI 自媒体、自动化工作流、可复制增长玩法。"></textarea>
            </div>

            <div class="action-bar">
              <p class="status" id="status" aria-live="polite"></p>
              <button id="analyzeButton" class="btn btn-primary btn-lg" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                生成提炼
              </button>
            </div>
          </section>

          <!-- Output Panel -->
          <section class="panel output-panel" aria-label="输出区">
            <div class="panel-header output-header">
              <div class="panel-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="2"/><line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="2"/><line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="2"/></svg>
                <h2>提炼结果</h2>
                <span id="usage" class="usage-tag"></span>
              </div>
              <button id="copyButton" class="btn btn-ghost btn-sm" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                复制
              </button>
            </div>

            <article id="result" class="result-area empty">
              <div class="empty-state">
                <div class="empty-icon">
                  <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <p class="empty-title">等待提炼</p>
                <span class="empty-desc">总结 · 评论区洞察 · 写作判断 · 方法论 · 攻略 · 转化方案</span>
              </div>
            </article>

            <div class="refine-panel">
              <div class="refine-quick-actions">
                <button class="btn btn-outline refine-button" type="button" data-action="expand-needs">展开诊断</button>
                <button class="btn btn-outline refine-button" type="button" data-action="missing-info">素材缺口</button>
                <button class="btn btn-outline refine-button" type="button" data-action="writing-angles">写作角度</button>
              </div>
              <div class="refine-custom-row">
                <input id="refineInstruction" type="text" placeholder="自定义干预：判断哪些部分值得写长文、哪里需要案例…">
                <button id="customRefineButton" class="btn btn-primary btn-sm" type="button">继续分析</button>
              </div>
            </div>
          </section>
        </div>

        <section class="history-view" id="historyView" hidden>
          <div class="panel history-panel">
            <div class="panel-header">
              <div class="panel-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 20V10M18 20V4M6 20v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <h2>云端历史记录</h2>
                <span id="historyStoreBadge" class="usage-tag"></span>
              </div>
              <button id="refreshHistoryButton" class="btn btn-ghost btn-sm" type="button">刷新</button>
            </div>
            <div class="history-tools">
              <input id="historySearch" type="search" placeholder="搜索标题、链接、备注或提炼结果">
              <button id="backToWorkspaceButton" class="btn btn-primary btn-sm" type="button">返回提炼</button>
            </div>
            <div id="historyList" class="history-list">
              <div class="history-empty">暂无历史记录。生成一次提炼后，会自动保存到这里。</div>
            </div>
          </div>
        </section>
      </div>

      <!-- Settings Dialog -->
      <dialog id="settingsDialog">
        <form method="dialog" class="dialog-content">
          <header class="dialog-header">
            <h2>设置</h2>
            <button class="btn-close" value="close" aria-label="关闭">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </header>
          <div class="dialog-body">
            <div class="field-group">
              <label for="appPassword">访问密码</label>
              <input id="appPassword" type="password" autocomplete="off" placeholder="公网部署后需要填写">
            </div>
            <div class="field-group">
              <label for="apiKey">DeepSeek API Key</label>
              <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
            </div>
            <div class="field-group">
              <label for="model">模型选择</label>
              <select id="model">
                <option value="deepseek-chat">deepseek-chat</option>
                <option value="deepseek-reasoner">deepseek-reasoner</option>
              </select>
            </div>
          </div>
          <footer class="dialog-footer">
            <button id="clearKeyButton" type="button" class="btn btn-ghost">清除 Key</button>
            <button id="saveSettingsButton" value="default" class="btn btn-primary">保存设置</button>
          </footer>
        </form>
      </dialog>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
