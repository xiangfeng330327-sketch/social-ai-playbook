<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 内容攻略提炼器</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>AI 内容攻略提炼器</h1>
            <p>把短内容整理成总结、方法论和行动攻略。</p>
          </div>
          <button class="icon-button" id="settingsButton" type="button" aria-label="设置" title="设置">
            <span aria-hidden="true">⚙︎</span>
          </button>
        </header>

        <div class="panes">
          <section class="input-pane" aria-label="输入区">
            <div class="pane-heading">
              <h2>素材</h2>
              <span>小红书 / 抖音</span>
            </div>
            <details class="collector">
              <summary>浏览器采集助手</summary>
              <div class="collector-body">
                <a id="collectorLink" class="collector-link" href="#">采集当前页</a>
                <button id="copyCollectorButton" class="ghost-button" type="button">复制脚本</button>
                <button id="importCollectedButton" class="ghost-button" type="button">导入采集</button>
              </div>
              <p>把“采集当前页”拖到书签栏；打开抖音/小红书页面并滚动到评论区后点它，再回这里导入。</p>
            </details>
            <div class="field">
              <label for="link">链接</label>
              <div class="link-row">
                <input id="link" type="url" placeholder="粘贴小红书文章/视频链接，或抖音视频链接">
                <button id="fetchButton" type="button">抽取</button>
              </div>
            </div>

            <div class="field">
              <label for="sourceText">正文 / 视频文案 / 字幕</label>
              <textarea id="sourceText" placeholder="粘贴正文、视频字幕、画面里的关键信息或你整理出的主要内容。只放链接时，平台可能因登录或反爬无法自动读取。"></textarea>
            </div>

            <div class="field">
              <label for="commentsText">评论区 / 高赞评论</label>
              <textarea id="commentsText" class="comments-box" placeholder="粘贴高赞评论、争议评论、用户提问、作者回复。这里会单独提炼用户需求、痛点、反对意见和可转化洞察。"></textarea>
            </div>

            <div class="field">
              <label for="note">你的补充</label>
              <textarea id="note" class="note-box" placeholder="例如：我关心 AI 产品、AI 自媒体、自动化工作流、可复制增长玩法。"></textarea>
            </div>

            <div class="control-row">
              <div class="segmented" role="group" aria-label="输出模式">
                <button class="segment active" type="button" data-mode="playbook">攻略</button>
                <button class="segment" type="button" data-mode="research">复盘</button>
                <button class="segment" type="button" data-mode="content">发布</button>
              </div>
              <button id="analyzeButton" class="primary-button" type="button">生成提炼</button>
            </div>

            <p class="status" id="status" aria-live="polite"></p>
          </section>

          <section class="output-pane" aria-label="输出区">
            <div class="output-toolbar">
              <div>
                <h2>提炼结果</h2>
                <span id="usage"></span>
              </div>
              <button id="copyButton" class="ghost-button" type="button">复制</button>
            </div>
            <article id="result" class="result empty">提炼结果会在这里生成：总结、评论区洞察、写作价值判断、方法论、实操攻略和写作转化方案。</article>
            <div class="refine-panel" aria-label="结果干预区">
              <div class="refine-actions">
                <button class="ghost-button refine-button" type="button" data-action="expand-needs">展开诊断</button>
                <button class="ghost-button refine-button" type="button" data-action="missing-info">素材缺口</button>
                <button class="ghost-button refine-button" type="button" data-action="writing-angles">写作角度</button>
              </div>
              <div class="refine-custom">
                <input id="refineInstruction" type="text" placeholder="自定义干预：例如，帮我判断哪些部分值得写成长文、哪里需要案例、哪里论证不够">
                <button id="customRefineButton" class="primary-button" type="button">继续分析</button>
              </div>
            </div>
          </section>
        </div>
      </section>

      <dialog id="settingsDialog">
        <form method="dialog" class="settings-card">
          <header>
            <h2>设置</h2>
            <button class="icon-button" value="close" aria-label="关闭" title="关闭">×</button>
          </header>
          <label for="appPassword">访问密码</label>
          <input id="appPassword" type="password" autocomplete="off" placeholder="公网部署后需要填写">
          <label for="apiKey">DeepSeek API Key</label>
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
          <label for="model">模型</label>
          <select id="model">
            <option value="deepseek-chat">deepseek-chat</option>
            <option value="deepseek-reasoner">deepseek-reasoner</option>
          </select>
          <menu>
            <button id="clearKeyButton" type="button" class="ghost-button">清除 Key</button>
            <button id="saveSettingsButton" value="default" class="primary-button">保存</button>
          </menu>
        </form>
      </dialog>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
